    <h1>ジャガイモ</h1>
    <p>ジャガイモは土の中にできるため、サツマイモのように「根っこ」が大きくなったものと思われがちですが、<br>実は地下にある茎（地下茎）の先端が膨らんだものです。<br>これを植物学では「塊茎（かいけい）」と呼びます。</p>
